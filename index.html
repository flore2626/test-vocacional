<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Test Vocacional | Universidad Sotavento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#002D72,#005BBB);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{

background:white;
max-width:700px;
width:100%;
border-radius:25px;
padding:45px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.2);

}

h1{

font-size:40px;
color:#003366;
margin-bottom:20px;

}

p{

font-size:18px;
color:#555;
line-height:1.7;

}

button{

margin-top:40px;
background:#FFD447;
border:none;
padding:18px 45px;
border-radius:50px;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.05);

}

.logo{

font-size:70px;
margin-bottom:25px;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">🎓</div>

<h1>Test Vocacional</h1>

<p>

Descubre qué licenciatura se adapta mejor a tu personalidad, habilidades e intereses.

</p>

<p style="margin-top:15px">

Responde unas preguntas y obtén un resultado personalizado en menos de 5 minutos.

</p>

<button onclick="alert('¡Muy pronto comenzaremos el test!')">

Comenzar

</button>

</div>

</body>
</html>
